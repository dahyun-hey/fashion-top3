name: 패션 TOP3 자동 업데이트

on:
  schedule:
    # 매일 한국시간 09:00, 15:00, 21:00 에 실행 (UTC 기준 00:00, 06:00, 12:00)
    - cron: '0 0,6,12 * * *'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run crawler
        run: python crawl_fashion.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "자동 업데이트: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M')"
          git push
